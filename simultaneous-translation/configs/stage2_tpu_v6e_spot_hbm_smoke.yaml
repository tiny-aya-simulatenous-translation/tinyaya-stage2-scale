# TPU v6e SPOT HBM instrumentation smoke config.
#
# WHY THIS EXISTS
# ---------------
# Short replay used after HBM instrumentation patches. It keeps the
# `opt-4-depth32` tensor shapes so memory telemetry is comparable, but
# stops after 20 optimizer steps to prove W&B emits non-zero HBM values
# or explicit `-1` sentinel metrics before launching the next Phase 4
# 300-step candidate.

backend: tpu

data:
  encoded_dir: /mnt/data/encoded
  train_split: /mnt/data/splits/train.jsonl
  val_split: /mnt/data/splits/val.jsonl
  max_frames: 400
  audio_frame_rate: 12.5
  num_workers: 4
  pin_memory: false

train:
  num_codebooks: 8
  batch_size: 8
  grad_accum: 4
  max_steps: 20
  warmup_steps: 20
  compile_warmup_steps: 1
  enable_clip_grad_norm: false
  fsdp_barrier_hook: false
  depth_chunk_size: 32
  precision: bfloat16
  use_scan_layers: false
  xla_grad_checkpoint: true
  final_canonical_save: false

loss:
  text_weight: 0.1
  audio_weight: 1.0

optim:
  lr_lora: 1.5e-4
  lr_full_ft: 5.0e-5
  lr_projection: 5.0e-4
  lr_depth: 2.5e-4
  lr_audio_embed: 5.0e-4
  lr_text_embed: 5.0e-4

logging:
  log_every: 10
  save_every: 0
  audio_every: 1000
  val_every: 500
  save_dir: gs://tinyaya-stage2-tpu/checkpoints/stage2-tpu-v6e-spot-hbm-smoke
  keep_last_n: 2
  use_wandb: true
  wandb_project: tinyaya-stage2-tpu
  wandb_run_name: v6e-spot-stage2-hbm-smoke

perf:
  enabled: true
  warmup_skip_steps: 10
  xprof_trace_labels: false
