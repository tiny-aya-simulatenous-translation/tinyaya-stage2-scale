# TPU v6e SPOT optimization config: 5000-step production pass.
#
# WHY THIS EXISTS
# ---------------
# This is the production promotion run combining all validated
# optimization candidates from Phases 1-3:
#   - Phase 1: log_every=10 (hot-redeploy validated, W&B pdhz1f95)
#   - Phase 2: compile_warmup_steps=1 with sampled sentinel (W&B huwkhcze)
#   - Phase 3: batch_size=8/grad_accum=4 confirmed as only viable
#     topology (b=16/g=2 NaN'd at step 130 due to bf16 reduce-scatter)
#
# Baseline comparison: iter 24h (W&B 7rrjupc7) completed 5000/5000
# steps with p50=6.96s/step, loss=5.3558, wall=615.9 min.
#
# v6e has 32 GiB HBM/chip. b=8/g=4 measured peak <12 GiB under
# fsdpv2_lora with xla_grad_checkpoint=true.
#
# Usage:
#   hot_redeploy.sh with CONFIG_FILE=configs/stage2_tpu_v6e_spot_opt_prod5k.yaml
#
# See also: docs/tpu-trc-allocation.md  (TRC quotas)

backend: tpu

data:
  encoded_dir: /mnt/data/encoded
  train_split: /mnt/data/splits/train.jsonl
  val_split: /mnt/data/splits/val.jsonl
  max_frames: 400
  audio_frame_rate: 12.5
  num_workers: 4
  pin_memory: false

# ---------------------------------------------------------------------
# Train: single-host v6e-8 spot.
# Effective batch = batch_size * grad_accum * 8 chips = 8 * 4 * 8 = 256.
# Production run: 5000 steps with Phases 1+2 optimizations.
# ---------------------------------------------------------------------
train:
  num_codebooks: 8
  # Phase 3 confirmed: b=8/g=4 is the only viable topology under
  # FSDPv2+bf16 on v6e-8. b=16/g=2 NaN'd at step 130.
  batch_size: 8
  grad_accum: 4
  # Production pass: full 5000 steps.
  max_steps: 5000
  warmup_steps: 200
  # Phase 2 promoted: one compile warmup step before visible step 1.
  compile_warmup_steps: 1
  enable_clip_grad_norm: false
  fsdp_barrier_hook: false
  depth_chunk_size: 16
  precision: bfloat16
  use_scan_layers: false
  xla_grad_checkpoint: true
  final_canonical_save: true

loss:
  text_weight: 0.1
  audio_weight: 1.0

optim:
  lr_lora: 1.5e-4
  lr_full_ft: 5.0e-5
  lr_projection: 5.0e-4
  lr_depth: 2.5e-4
  lr_audio_embed: 5.0e-4
  lr_text_embed: 5.0e-4

logging:
  # Phase 1 promoted: log_every=10 reduces host sync overhead.
  log_every: 10
  save_every: 0
  audio_every: 1000
  val_every: 500
  save_dir: gs://tinyaya-stage2-tpu/checkpoints/stage2-tpu-v6e-spot-opt-prod5k
  keep_last_n: 5
  use_wandb: true
  wandb_project: tinyaya-stage2-tpu
  # Production pass: 5000 steps with all promoted optimizations.
  wandb_run_name: v6e-spot-stage2-opt-prod5k

# ---------------------------------------------------------------------
# Perf instrumentation: enabled for production monitoring.
# ---------------------------------------------------------------------
perf:
  enabled: true
  warmup_skip_steps: 50
  xprof_trace_labels: false
