# TPU v6e SPOT optimization config: Phase 5 input/transfer profiling.
#
# WHY THIS EXISTS
# ---------------
# Phase 4 promoted depth_chunk_size=64 after the 5000-step production
# pass. Before changing input-pipeline code, this short run keeps the
# same stable topology and enables XProf trace labels so we can measure
# whether `data_fetch` or `device_transfer` leaves the TPU idle.
#
# Base config: opt-4-depth64-prod5k.
# Change: max_steps 5000 -> 300, disable validation/audio/final save,
# and enable `perf.xprof_trace_labels` for an external XProf capture.

backend: tpu

# ---------------------------------------------------------------------
# Data path: keep the exact static-shape topology from depth64 prod.
# TPU note: max_frames=400 and batch_size=8 are part of the compiled
# graph shape; Phase 5 only observes host/device gaps and does not yet
# change workers, prefetching, or bucketing.
# ---------------------------------------------------------------------
data:
  encoded_dir: /mnt/data/encoded
  train_split: /mnt/data/splits/train.jsonl
  val_split: /mnt/data/splits/val.jsonl
  max_frames: 400
  audio_frame_rate: 12.5
  num_workers: 4
  pin_memory: false

# ---------------------------------------------------------------------
# Training topology: identical to the depth64 production pass except
# for the shorter profile gate and disabled final canonical save.
# TPU note: compile_warmup_steps=1 keeps the counted step window close
# to steady-state; final_canonical_save=false avoids a destructive
# model.to("cpu") gather for this profiling-only run.
# ---------------------------------------------------------------------
train:
  num_codebooks: 8
  batch_size: 8
  grad_accum: 4
  max_steps: 300
  warmup_steps: 200
  compile_warmup_steps: 1
  enable_clip_grad_norm: false
  fsdp_barrier_hook: false
  depth_chunk_size: 64
  precision: bfloat16
  use_scan_layers: false
  xla_grad_checkpoint: true
  final_canonical_save: false

loss:
  text_weight: 0.1
  audio_weight: 1.0

optim:
  lr_lora: 1.5e-4
  lr_full_ft: 5.0e-5
  lr_projection: 5.0e-4
  lr_depth: 2.5e-4
  lr_audio_embed: 5.0e-4
  lr_text_embed: 5.0e-4

# ---------------------------------------------------------------------
# Logging: W&B stays enabled for orchestrator metrics, but validation,
# demo audio, periodic saves, and final saves are disabled because this
# run exists only to capture XProf/input-transfer evidence.
# ---------------------------------------------------------------------
logging:
  log_every: 10
  save_every: 0
  audio_every: 0
  val_every: 0
  save_dir: gs://tinyaya-stage2-tpu/checkpoints/stage2-tpu-v6e-spot-opt5-profile
  keep_last_n: 5
  use_wandb: true
  wandb_project: tinyaya-stage2-tpu
  wandb_run_name: v6e-spot-stage2-opt5-profile

# ---------------------------------------------------------------------
# Perf instrumentation: labels are visible only while an external XProf
# capture is attached to the TPU profiler server on port 9012.
# ---------------------------------------------------------------------
perf:
  enabled: true
  warmup_skip_steps: 50
  xprof_trace_labels: true
