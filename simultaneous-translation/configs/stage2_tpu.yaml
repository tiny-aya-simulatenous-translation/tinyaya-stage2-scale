# TPU full-run config -- Stage 2 translation training, 5000 steps.
#
# Same model as stage2_tpu_canary.yaml; differences:
#   * effective batch + step count tuned for the production run
#   * checkpoints land in GCS (not local disk)
#   * less frequent logging cadence
#   * TPU compile + memory flags identical to the canary so the
#     canary's behaviour transfers cleanly to the long run.
#
# Usage:
#   python scripts/train_hierarchical.py --config configs/stage2_tpu.yaml

backend: tpu

# ---------------------------------------------------------------------
# Data: same paths and resolution as the canary. ``max_frames=300``
# (24 s at 12.5 fps) was the original target before the XLA compile
# blowup forced a temporary downgrade.
# ---------------------------------------------------------------------
data:
  encoded_dir: /mnt/data/encoded
  train_split: /mnt/data/splits/train.jsonl
  val_split: /mnt/data/splits/val.jsonl
  max_frames: 300
  audio_frame_rate: 12.5
  num_workers: 4
  pin_memory: false

# ---------------------------------------------------------------------
# Train: production batch sizing. On v4-64 (32 chips) the effective
# batch is 2 * 2 * 32 = 128. On v5litepod-16 (16 chips) it would be
# 2 * 2 * 16 = 64; if you switch accelerators, double-check
# ``batch_size`` does not push per-chip HBM past 12 GB.
# ---------------------------------------------------------------------
train:
  num_codebooks: 8
  batch_size: 2
  grad_accum: 2
  max_steps: 5000
  warmup_steps: 500
  depth_chunk_size: 16
  precision: bfloat16

  # ---- TPU compile + memory optimisations (PLAN.md Phase 1 + 2) ----
  # use_scan_layers DISABLED -- incompatible with our LoRA[0:33] +
  # FullFT[34:35] design (scan_layers requires uniform parameter
  # structure, see _ensure_same_structure in scan_layers.py).
  # Future option: partition into scan[0:34] + manual[34:36].
  # See configs/stage2_tpu_canary.yaml for the full rationale.
  use_scan_layers: false
  # xla_grad_checkpoint ENABLED for production:
  # without scan we pay the full unrolled-layer activation cost,
  # so per-layer checkpointing is required to stay under 32 GB HBM
  # for max_frames=300 + bf16. Canary disables this to keep the
  # first compile minimal; production needs it for the 5000-step run.
  xla_grad_checkpoint: true

loss:
  text_weight: 0.1
  audio_weight: 1.0

optim:
  lr_lora: 1.5e-4
  lr_full_ft: 5.0e-5
  lr_projection: 5.0e-4
  lr_depth: 2.5e-4
  lr_audio_embed: 5.0e-4
  lr_text_embed: 5.0e-4

# Production logging cadence: less chatter, larger save intervals.
# ``save_dir`` is a GCS path; ``save_checkpoint`` uses ``xm.save``
# which writes through the host filesystem, so the GCS bucket must be
# pre-mounted (see scripts/tpu/startup_script.sh).
logging:
  log_every: 20
  save_every: 500
  audio_every: 1000
  val_every: 1000
  save_dir: gs://tinyaya-stage2-tpu/checkpoints/stage2-tpu
  keep_last_n: 3
  use_wandb: true
  wandb_project: tinyaya-stage2-tpu
  wandb_run_name: v4-64-on-demand
