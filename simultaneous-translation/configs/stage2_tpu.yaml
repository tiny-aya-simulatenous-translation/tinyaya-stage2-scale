# TPU training config for Stage 2 translation training
# Use with: python scripts/train_hierarchical.py --config configs/stage2_tpu.yaml

backend: tpu

data:
  encoded_dir: /mnt/data/encoded
  train_split: /mnt/data/splits/train.jsonl
  val_split: /mnt/data/splits/val.jsonl
  max_frames: 300
  audio_frame_rate: 12.5
  num_workers: 4
  pin_memory: false

train:
  num_codebooks: 8
  batch_size: 2
  grad_accum: 2
  # Effective batch = batch_size * grad_accum * num_chips
  # v4-64 = 32 chips: 2 * 2 * 32 = 128
  max_steps: 5000
  warmup_steps: 500
  depth_chunk_size: 16
  precision: bfloat16

loss:
  text_weight: 0.1
  audio_weight: 1.0

optim:
  lr_lora: 1.5e-4
  lr_full_ft: 5e-5
  lr_projection: 5e-4
  lr_depth: 2.5e-4
  lr_audio_embed: 5e-4
  lr_text_embed: 5e-4

logging:
  log_every: 20
  save_every: 500
  audio_every: 1000
  val_every: 1000
  save_dir: gs://tinyaya-stage2-tpu/checkpoints/stage2-tpu
  keep_last_n: 3
  use_wandb: true
  wandb_project: tinyaya-stage2-tpu
  wandb_run_name: v4-64-on-demand
