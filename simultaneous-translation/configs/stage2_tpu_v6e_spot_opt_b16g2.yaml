# TPU v6e SPOT optimization config: Phase 3 batch/grad-accum sweep.
#
# WHY THIS EXISTS
# ---------------
# Phase 3 hypothesis: fewer micro-steps per optimizer step improves
# throughput at the same effective batch size. This candidate doubles
# batch_size (8->16) and halves grad_accum (4->2), keeping effective
# batch = 16 * 2 * 8 chips = 256. The trade-off is higher per-chip
# activation memory.
#
# Prior iter 19/20 measured peak HBM at 22.67 GiB (72.5%) under
# batch=16 + grad_ckpt + max_frames=400. The 20-step smoke passed
# cleanly (4.21s/step, 60.8 examples/sec, no OOM/NaN). Now running
# the 300-step stability gate.
#
# Usage:
#   hot_redeploy.sh with CONFIG_FILE=configs/stage2_tpu_v6e_spot_opt_b16g2.yaml
#
# See also: docs/tpu-trc-allocation.md  (TRC quotas)

backend: tpu

data:
  encoded_dir: /mnt/data/encoded
  train_split: /mnt/data/splits/train.jsonl
  val_split: /mnt/data/splits/val.jsonl
  max_frames: 400
  audio_frame_rate: 12.5
  num_workers: 4
  pin_memory: false

# ---------------------------------------------------------------------
# Train: single-host v6e-8 spot.
# Effective batch = batch_size * grad_accum * 8 chips = 16 * 2 * 8 = 256.
# Candidate: opt-3-b16g2, 20-step smoke -> 300-step gate.
# ---------------------------------------------------------------------
train:
  num_codebooks: 8
  # Phase 3: batch_size doubled, grad_accum halved.
  # Same effective batch 256 as iter 24h (8*4*8=256).
  # Prior iter 19/20 hit 22.67 GiB/chip under b=16 so HBM
  # headroom is ~9 GiB. This smoke run confirms that holds
  # under the promoted Phases 1+2 config (log10 + warmup).
  batch_size: 16
  grad_accum: 2
  # 20-step smoke passed (4.21s/step, 60.8 examples/sec).
  # Now running 300-step stability gate.
  max_steps: 300
  warmup_steps: 200
  # Phase 2 promoted: one compile warmup step before visible step 1.
  compile_warmup_steps: 1
  enable_clip_grad_norm: false
  fsdp_barrier_hook: false
  depth_chunk_size: 16
  precision: bfloat16
  use_scan_layers: false
  xla_grad_checkpoint: true
  final_canonical_save: true

loss:
  text_weight: 0.1
  audio_weight: 1.0

optim:
  lr_lora: 1.5e-4
  lr_full_ft: 5.0e-5
  lr_projection: 5.0e-4
  lr_depth: 2.5e-4
  lr_audio_embed: 5.0e-4
  lr_text_embed: 5.0e-4

logging:
  # Phase 1 promoted: log_every=10 reduces host sync overhead.
  log_every: 10
  save_every: 0
  audio_every: 1000
  val_every: 500
  save_dir: gs://tinyaya-stage2-tpu/checkpoints/stage2-tpu-v6e-spot-opt-b16g2-300
  keep_last_n: 5
  use_wandb: true
  wandb_project: tinyaya-stage2-tpu
  # Phase 3 candidate: b=16/g=2 at same effective batch 256.
  wandb_run_name: v6e-spot-stage2-opt3-b16g2-300

# ---------------------------------------------------------------------
# Perf instrumentation: enabled. XProf labels stay disabled to
# isolate the batch/grad-accum change.
# ---------------------------------------------------------------------
perf:
  enabled: true
  warmup_skip_steps: 50
  xprof_trace_labels: false
