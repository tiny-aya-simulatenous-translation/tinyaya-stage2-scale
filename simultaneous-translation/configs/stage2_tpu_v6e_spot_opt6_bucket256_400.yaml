# TPU v6e SPOT optimization config: Phase 6 two-bucket multiple-of-64 retry.
#
# WHY THIS EXISTS
# ---------------
# `[200,400]` proved conservative bucketing is stable, but it only
# reduces padded frame-tokens by ~9%. The failed `[200,300,400]` run
# implicated the 300-frame shape specifically. This candidate tests a
# lower, TPU-friendlier 256-frame boundary plus the known-good 400-frame
# production shape, keeping only two prewarmed graphs.

backend: tpu

data:
  encoded_dir: /mnt/data/encoded
  train_split: /mnt/data/splits/train.jsonl
  val_split: /mnt/data/splits/val.jsonl
  max_frames: 400
  bucket_frames: [256, 400]
  audio_frame_rate: 12.5
  num_workers: 4
  pin_memory: false

train:
  num_codebooks: 8
  batch_size: 8
  grad_accum: 4
  max_steps: 300
  warmup_steps: 200
  compile_warmup_steps: 2
  enable_clip_grad_norm: false
  fsdp_barrier_hook: false
  depth_chunk_size: 64
  precision: bfloat16
  use_scan_layers: false
  xla_grad_checkpoint: true
  final_canonical_save: false

loss:
  text_weight: 0.1
  audio_weight: 1.0

optim:
  lr_lora: 1.5e-4
  lr_full_ft: 5.0e-5
  lr_projection: 5.0e-4
  lr_depth: 2.5e-4
  lr_audio_embed: 5.0e-4
  lr_text_embed: 5.0e-4

logging:
  log_every: 10
  save_every: 0
  audio_every: 0
  val_every: 0
  save_dir: gs://tinyaya-stage2-tpu/checkpoints/stage2-tpu-v6e-spot-opt6-bucket256-400
  keep_last_n: 5
  use_wandb: true
  wandb_project: tinyaya-stage2-tpu
  wandb_run_name: v6e-spot-stage2-opt6-bucket256-400

perf:
  enabled: true
  warmup_skip_steps: 50
  xprof_trace_labels: false
