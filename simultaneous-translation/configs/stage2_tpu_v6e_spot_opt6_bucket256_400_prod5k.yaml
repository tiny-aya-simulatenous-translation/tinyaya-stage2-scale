# TPU v6e SPOT optimization config: Phase 6 `[256,400]` production pass.
#
# WHY THIS EXISTS
# ---------------
# The 300-step (`y1m2htgu`, p50=3.359s, eps=72.20) and 1000-step
# (`zqgip8uc`, p50=3.393s, p99=4.029s, eps=72.64, loss=6.209,
# HBM peak=26.36 GiB) gates for the `[256,400]` two-bucket sampler
# both passed with the best throughput we have measured on v6e-8.
# This config promotes the same two static shapes to a full 5000-step
# production pass per `.factory/orchestration/TPU_OPTIMIZATION_SPEC.md`
# Phase 8 (selected candidate -> 1000-step validation -> 5000-step
# production -> `eval_stage2.py`).
#
# Base config: opt-6-bucket256-400-1k.
# Changes: max_steps 1000 -> 5000, final_canonical_save false -> true,
# audio_every 0 -> 1000, val_every 0 -> 500, save_dir and
# wandb_run_name updated, all matching the opt-4-depth64-prod5k
# pattern so this run produces a promoted checkpoint comparable to the
# prior 5000-step promotion.
#
# TPU note: keep the 29 GiB HBM abort gate. The [256,400] sampler
# raises peak HBM to 26.36 GiB (vs depth64-prod5k 25.24-26.34 GiB),
# still safely below the ceiling but closer than the 200/400 candidate
# (27.30 GiB). The bucket sampler places one zero-LR warmup macro-step
# per bucket first, so both static shapes compile before visible step 1.

backend: tpu

data:
  encoded_dir: /mnt/data/encoded
  train_split: /mnt/data/splits/train.jsonl
  val_split: /mnt/data/splits/val.jsonl
  max_frames: 400
  bucket_frames: [256, 400]
  audio_frame_rate: 12.5
  num_workers: 4
  pin_memory: false

train:
  num_codebooks: 8
  batch_size: 8
  grad_accum: 4
  max_steps: 5000
  warmup_steps: 200
  # One zero-LR macro-step per bucket so both 256-frame and 400-frame
  # graphs compile before counted training.
  compile_warmup_steps: 2
  enable_clip_grad_norm: false
  fsdp_barrier_hook: false
  depth_chunk_size: 64
  precision: bfloat16
  use_scan_layers: false
  xla_grad_checkpoint: true
  final_canonical_save: true

loss:
  text_weight: 0.1
  audio_weight: 1.0

optim:
  lr_lora: 1.5e-4
  lr_full_ft: 5.0e-5
  lr_projection: 5.0e-4
  lr_depth: 2.5e-4
  lr_audio_embed: 5.0e-4
  lr_text_embed: 5.0e-4

logging:
  log_every: 10
  save_every: 0
  audio_every: 1000
  val_every: 500
  save_dir: gs://tinyaya-stage2-tpu/checkpoints/stage2-tpu-v6e-spot-opt6-bucket256-400-prod5k
  keep_last_n: 5
  use_wandb: true
  wandb_project: tinyaya-stage2-tpu
  wandb_run_name: v6e-spot-stage2-opt6-bucket256-400-prod5k

perf:
  enabled: true
  warmup_skip_steps: 50
  xprof_trace_labels: false
